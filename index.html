<style>
  :root{
    --paper:#000000;
    --ink:#ebece9;
    --soft:#9a9a92;
    --hair:rgba(235,236,233,.16);
    --spot:#ff2a17;
    --pad:clamp(16px,3.2vmin,34px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"JetBrains Mono",ui-monospace,monospace;
    height:100svh;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}

  /* ---- proof sheet shell ---- */
  .sheet{
    position:relative;
    height:100svh;
    padding:var(--pad);
    display:flex;
    flex-direction:column;
  }
  .frame{
    position:absolute;
    inset:calc(var(--pad) * .62);
    pointer-events:none;
  }
  /* crop marks at the four corners */
  .crop{position:absolute;width:14px;height:14px;pointer-events:none}
  .crop::before,.crop::after{content:"";position:absolute;background:var(--ink)}
  .crop::before{width:14px;height:1px;top:0;left:0}
  .crop::after{width:1px;height:14px;top:0;left:0}
  .crop.tl{top:calc(var(--pad) * .28);left:calc(var(--pad) * .28)}
  .crop.tr{top:calc(var(--pad) * .28);right:calc(var(--pad) * .28);transform:scaleX(-1)}
  .crop.bl{bottom:calc(var(--pad) * .28);left:calc(var(--pad) * .28);transform:scaleY(-1)}
  .crop.br{bottom:calc(var(--pad) * .28);right:calc(var(--pad) * .28);transform:scale(-1)}

  /* ---- top bar ---- */
  .topbar{
    flex:0 0 auto;
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
    font-size:clamp(.58rem,1.45vmin,.72rem);
    letter-spacing:.16em;text-transform:uppercase;color:var(--soft);
  }
  .reg{display:inline-flex;align-items:center;gap:.6em}
  .reg svg{width:13px;height:13px;display:block}
  .reg b{color:var(--soft);font-weight:400;letter-spacing:.14em}
  .coords{text-align:right;line-height:1.5;white-space:nowrap}
  /* On narrow phones keep the coordinates but shrink them a touch so the top bar never crowds or wraps. */
  @media (max-width:560px){ .coords{font-size:.56rem;letter-spacing:.08em} }

  /* ---- main ---- */
  .main{
    flex:1 1 auto;min-height:0;
    display:grid;
    grid-template-columns:1fr;
    align-content:center;
    gap:clamp(14px,2.4vmin,26px);
    padding:clamp(8px,2vmin,22px) 0;
  }
  .portrait{
    align-self:center;justify-self:start;
    background:var(--paper);
    max-height:min(20svh,150px);
    width:auto;display:block;
  }
  .ident{display:flex;flex-direction:column;gap:clamp(10px,2vmin,18px);min-width:0}

  h1.name{
    font-family:"Helvetica Neue",Helvetica,"Inter",Arial,sans-serif;
    font-optical-sizing:auto;
    font-weight:700;
    text-transform:uppercase;
    line-height:.9;
    letter-spacing:-.022em;
    font-size:clamp(2.5rem,13vmin,7rem);
    margin-block:-.03em;
  }
  h1.name span{display:block}
  h1.name .r2{margin-left:0}

  /* ---- spec table ---- */
  .spec{
    display:grid;
    grid-template-columns:auto 1fr;
    column-gap:clamp(14px,2.6vmin,30px);
    row-gap:clamp(7px,1.5vmin,13px);
    font-size:clamp(.74rem,1.85vmin,.95rem);
    line-height:1.35;
    max-width:46ch;
  }
  .spec dt{
    color:var(--soft);text-transform:uppercase;letter-spacing:.13em;
    font-size:.78em;white-space:nowrap;
    align-self:end;
  }
  .spec dd{color:var(--ink)}
  .spec dd .sep{color:var(--hair);margin:0 .35em}

  /* invert-on-hover link */
  .lk{
    position:relative;display:inline;
    color:var(--ink);
    box-decoration-break:clone;-webkit-box-decoration-break:clone;
    padding:.04em .2em;margin:0 -.2em;
    background-image:linear-gradient(var(--ink),var(--ink));
    background-size:100% 0%;background-position:0 100%;background-repeat:no-repeat;
    transition:background-size .22s cubic-bezier(.2,.7,.2,1),color .22s;
  }
  .lk .arw{font-size:.78em;vertical-align:.06em;opacity:.55}
  /* Invert-on-hover only where a real pointer exists, so taps on touch screens
     don't leave the link "stuck" highlighted after returning to the page.
     Keyboard focus keeps the effect for accessibility. */
  @media (hover:hover) and (pointer:fine){
    .lk:hover{color:var(--paper);background-size:100% 100%}
    .lk:hover .arw{opacity:.8}
  }
  .lk:focus-visible{color:var(--paper);background-size:100% 100%}
  .lk:focus-visible .arw{opacity:.8}
  a:focus-visible{outline:2px solid var(--spot);outline-offset:3px;border-radius:1px}

  /* ---- footer ---- */
  .foot{
    flex:0 0 auto;
    display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
    font-size:clamp(.58rem,1.45vmin,.72rem);
    letter-spacing:.14em;text-transform:uppercase;color:var(--soft);
  }
  .foot .dom{color:var(--soft);font-family:"Libre Barcode 128",system-ui,monospace;font-size:2em;letter-spacing:normal;line-height:1}
  .foot .colo{text-align:right;line-height:1.5;max-width:30ch}
  @media (max-height:560px){ .foot .colo{display:none} }

  /* ====== WIDE / LANDSCAPE: two columns ====== */
  @media (min-width:880px) and (min-height:480px){
    .main{
      grid-template-columns:auto auto;
      grid-template-areas:"portrait ident";
      justify-content:center;
      align-items:center;
      gap:clamp(30px,3.6vw,58px);
      padding:0;
    }
    .portrait{grid-area:portrait;max-height:min(40svh,260px);align-self:center}
    .ident{grid-area:ident}
    h1.name{font-size:clamp(3.2rem,8.4vmin,6.6rem)}
  }
  /* short landscape phones */
  @media (max-height:480px) and (orientation:landscape){
    .main{grid-template-columns:auto auto;justify-content:center;gap:clamp(20px,4vw,40px);align-items:center}
    .portrait{max-height:min(56svh,175px)}
    h1.name{font-size:clamp(2rem,8vh,3.4rem)}
    .topbar,.foot{font-size:.56rem}
  }

  /* reduced motion handled (no entrance animation by default for safety) */
  .reveal{opacity:0;transform:translateY(8px);animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards}
  .reveal.d1{animation-delay:.05s}
  .reveal.d2{animation-delay:.13s}
  .reveal.d3{animation-delay:.2s}
  .reveal.d4{animation-delay:.27s}
  .portrait.reveal{transform:none;animation:fade .9s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes fade{to{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .reveal{animation:none;opacity:1;transform:none}
  }
</style>
</head>
